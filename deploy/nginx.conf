events {}
http {
  # The stock nginx image's default access_log (piped to /dev/stdout via a
  # symlink set up by that image's own conf.d/nginx.conf) never applies here
  # since this file replaces nginx.conf outright and never includes conf.d.
  # Without this, nginx silently drops every access log line.
  log_format resolver_access '$remote_addr - [$time_local] "$request" $status $body_bytes_sent '
                              'rt=$request_time urt=$upstream_response_time';
  access_log /dev/stdout resolver_access;

  upstream resolver { server api-1:8080; server api-2:8080; }
  upstream diagnostics { server mcp:8080; }
  # Preserve an upstream-set X-Forwarded-Proto (e.g. from a TLS-terminating
  # reverse proxy in front of nginx); only fall back to $scheme when absent.
  map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
  }
  server {
    listen 80;
    location / {
      proxy_pass http://resolver;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_buffering off;
      proxy_read_timeout 10m;
      proxy_send_timeout 10m;
    }
    location /mcp {
      proxy_pass http://diagnostics;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_buffering off;
      proxy_read_timeout 10m;
    }
    location /internal/ { deny all; }
    location = /metrics { deny all; }
  }
}
