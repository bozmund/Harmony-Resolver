# RabbitMQ for the Harmony Resolver downloader fleet.
# 5672 is plaintext AMQP, reachable only inside the Docker network (api-1/api-2 publish doorbells here).
# 5671 is AMQPS, published to the host for home downloaders — a password over plaintext would be exposed,
# so TLS is mandatory on the public listener.
listeners.tcp.default = 5672
listeners.ssl.default = 5671

# The bootstrap script provides a private CA plus a separate server certificate at /certs. verify_none:
# clients authenticate with username/password over TLS; we do not require client certificates.
ssl_options.cacertfile = /certs/ca.crt
ssl_options.certfile = /certs/tls.crt
ssl_options.keyfile = /certs/tls.key
ssl_options.verify = verify_none
ssl_options.fail_if_no_peer_cert = false

# The default guest user is loopback-only out of the box; keep it that way and use real users.
loopback_users.guest = true
