<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Harmony Music, Cloud, Resolver and Platform architecture</title>
  <desc id="desc">Harmony Music uses one public Harmony API gateway. Requests route to Harmony Cloud and Harmony Resolver. Cloud stores user sync data in PostgreSQL and grants missing audio uploads to Resolver. Resolver stores permanent media in MinIO, metadata in PostgreSQL and dispatches extraction work through RabbitMQ.</desc>
  <defs>
    <style>
      .bg{fill:#10141d}.box{fill:#1b2230;stroke:#7283a7;stroke-width:2}.accent{fill:#172d31;stroke:#52c7b8}.storage{fill:#2a2235;stroke:#b88ad8}.text{fill:#f3f6fb;font:500 22px system-ui,sans-serif}.sub{fill:#b8c1d4;font:400 16px system-ui,sans-serif}.line{stroke:#91a0bd;stroke-width:3;fill:none;marker-end:url(#arrow)}.grant{stroke:#52c7b8}.dash{stroke-dasharray:10 8}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#91a0bd"/></marker>
  </defs>
  <rect class="bg" width="1400" height="620" rx="24"/>
  <rect class="box" x="50" y="245" width="230" height="120" rx="18"/>
  <text class="text" x="165" y="292" text-anchor="middle">Harmony Music</text>
  <text class="sub" x="165" y="325" text-anchor="middle">sync · upload · playback</text>
  <rect class="accent" x="370" y="245" width="280" height="120" rx="18"/>
  <text class="text" x="510" y="292" text-anchor="middle">harmony-resolver.duckdns.org</text>
  <text class="sub" x="510" y="325" text-anchor="middle">Platform ingress + TLS</text>
  <rect class="box" x="760" y="85" width="230" height="120" rx="18"/>
  <text class="text" x="875" y="132" text-anchor="middle">Harmony Cloud</text>
  <text class="sub" x="875" y="165" text-anchor="middle">user sync + upload grants</text>
  <rect class="box" x="760" y="405" width="230" height="120" rx="18"/>
  <text class="text" x="875" y="452" text-anchor="middle">Harmony Resolver</text>
  <text class="sub" x="875" y="485" text-anchor="middle">catalog + permanent media</text>
  <rect class="storage" x="1100" y="50" width="250" height="95" rx="18"/>
  <text class="text" x="1225" y="91" text-anchor="middle">Cloud PostgreSQL</text>
  <text class="sub" x="1225" y="119" text-anchor="middle">events + snapshots</text>
  <rect class="storage" x="1100" y="225" width="250" height="95" rx="18"/>
  <text class="text" x="1225" y="266" text-anchor="middle">MinIO</text>
  <text class="sub" x="1225" y="294" text-anchor="middle">50 GiB permanent media</text>
  <rect class="storage" x="1100" y="350" width="250" height="95" rx="18"/>
  <text class="text" x="1225" y="391" text-anchor="middle">Resolver PostgreSQL</text>
  <text class="sub" x="1225" y="419" text-anchor="middle">tracks + capacity</text>
  <rect class="storage" x="1100" y="475" width="250" height="95" rx="18"/>
  <text class="text" x="1225" y="516" text-anchor="middle">RabbitMQ</text>
  <text class="sub" x="1225" y="544" text-anchor="middle">downloader jobs</text>
  <path class="line" d="M280 305H370"/>
  <path class="line" d="M650 275C700 250 705 145 760 145"/>
  <path class="line" d="M650 335C700 360 705 465 760 465"/>
  <path class="line grant dash" d="M875 205V405"/>
  <text class="sub" x="895" y="310">missing videoId + grant</text>
  <path class="line" d="M990 145C1040 145 1045 98 1100 98"/>
  <path class="line" d="M990 445C1040 420 1045 273 1100 273"/>
  <path class="line" d="M990 465C1040 465 1045 398 1100 398"/>
  <path class="line" d="M990 485C1040 510 1045 523 1100 523"/>
</svg>
