name: publish images
on:
  push:
    branches: [main]
permissions: { contents: read, packages: write }
jobs:
  ghcr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: api-meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/harmony-resolver-api
          tags: |
            type=sha
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}
      - uses: docker/metadata-action@v5
        id: mcp-meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/harmony-resolver-mcp
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.mcp-meta.outputs.tags }}
          labels: ${{ steps.mcp-meta.outputs.labels }}
      - uses: docker/metadata-action@v5
        id: downloader-meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/harmony-resolver-downloader
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.downloader
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.downloader-meta.outputs.tags }}
          labels: ${{ steps.downloader-meta.outputs.labels }}
      - name: Dispatch immutable image to Harmony Platform
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
        run: |
          gh api repos/${{ github.repository_owner }}/Harmony-Platform/dispatches \
            -f event_type=resolver-published \
            -f client_payload[resolver_image]=ghcr.io/${{ github.repository_owner }}/harmony-resolver-api:sha-${{ github.sha }}
