name: ci
on: [push, pull_request]
permissions: { contents: read, security-events: write }
jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x }
      - run: dotnet restore Harmony.Resolver.slnx
      - run: dotnet format Harmony.Resolver.slnx --verify-no-changes --no-restore
      - run: dotnet build Harmony.Resolver.slnx -c Release --no-restore
      - run: dotnet test Harmony.Resolver.slnx -c Release --no-build
      - run: dotnet list Harmony.Resolver.slnx package --vulnerable --include-transitive
      - run: docker compose config --quiet
  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up --build -d
      - run: |
          for attempt in {1..60}; do
            curl --fail --silent http://localhost:8088/health/ready && exit 0
            sleep 2
          done
          docker compose logs
          exit 1
      - run: curl --fail --silent http://localhost:8088/openapi/v1.json >/dev/null
      - if: always()
        run: docker compose down --volumes
  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - run: nix flake check --no-build
