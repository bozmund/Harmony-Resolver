name: deploy
on:
  workflow_run:
    workflows: ["publish images"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}
permissions: { contents: read }
jobs:
  redeploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/harmony-resolver
            git pull --ff-only
            if ! sudo systemctl restart harmony-resolver.service; then
              echo '=== harmony-resolver service status ==='
              sudo systemctl status harmony-resolver.service --no-pager --full || true
              echo '=== harmony-resolver service journal (last 200 lines) ==='
              sudo journalctl -u harmony-resolver.service --no-pager --lines 200 || true
              echo '=== RabbitMQ container status ==='
              sudo docker ps -a --filter 'name=rabbitmq' --format '{{.Names}} {{.Status}}' || true
              echo '=== RabbitMQ container log (last 200 lines) ==='
              sudo docker logs --tail 200 harmony-resolver-rabbitmq-1 || true
              exit 1
            fi
